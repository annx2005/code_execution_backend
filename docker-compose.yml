services:
  postgres:
    image: postgres:16-alpine
    container_name: code_exec_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_execution
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d code_execution"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: code_exec_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-dev:
    image: node:22-alpine
    container_name: code_exec_backend_dev
    working_dir: /app
    command: sh -c "apk add --no-cache docker-cli && yarn install && yarn start:dev"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-executor:
        condition: service_started
      node-executor:
        condition: service_started
      c-cpp-executor:
        condition: service_started
      java-executor:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: code_execution
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code_exec_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-executor:
        condition: service_started
      node-executor:
        condition: service_started
      c-cpp-executor:
        condition: service_started
      java-executor:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: code_execution
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # PRE-PULL IMAGES FOR CODE EXECUTION
  python-executor:
    image: python:3.10-alpine
    command: ["echo", "Python image ready"]
    restart: "no"

  node-executor:
    image: node:20-alpine
    command: ["echo", "Node image ready"]
    restart: "no"

  # Cập nhật cho Mac ARM64 (M1/M2/M3)
  c-cpp-executor:
    image: gcc:13
    command: ["echo", "C/C++ image ready"]
    restart: "no"

  java-executor:
    image: eclipse-temurin:17-jdk
    command: ["echo", "Java image ready"]
    restart: "no"

volumes:
  postgres_data:
  redis_data: